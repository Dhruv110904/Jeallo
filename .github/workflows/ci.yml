name: CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  # ----------------------------------------------------
  # Job 1: Frontend React Validation
  # ----------------------------------------------------
  frontend-ci:
    name: Frontend (React/Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: jeallo/package-lock.json

      - name: Install Dependencies
        working-directory: ./jeallo
        run: npm ci

      - name: Run Linter
        working-directory: ./jeallo
        run: npm run lint

      - name: Build Application
        working-directory: ./jeallo
        run: npm run build

  # ----------------------------------------------------
  # Job 2: Backend Laravel Validation
  # ----------------------------------------------------
  backend-ci:
    name: Backend (Laravel API)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, sockets, gd, exif
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        working-directory: ./jeallo-api
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer Dependencies
        working-directory: ./jeallo-api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Environment
        working-directory: ./jeallo-api
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Tests
        working-directory: ./jeallo-api
        run: php artisan test

  # ----------------------------------------------------
  # Job 3: Docker Build Verification
  # ----------------------------------------------------
  docker-build:
    name: Docker Compile Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker Layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Verify Docker Compose Build
        run: docker compose build
